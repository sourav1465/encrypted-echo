version: '3.8'

services:
  mongodb:
    image: mongo:latest
    ports:
      - "27017:27017"

  backend:
    build: .
    ports:
      - "5000:5000"
    depends_on:
      - mongodb
    environment:
      - MONGO_URI=mongodb://mongodb:27017/blogDB
      - JWT_SECRET=your_super_secret_key

  frontend:
    build: ./frontend
    ports:
      - "5173:5173"
    depends_on:
      - backend